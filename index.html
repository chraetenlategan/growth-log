<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Growth Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#F5EFE6;min-height:100%;font-family:'Lora',Georgia,serif;color:#2C2416;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#C9B99A;border-radius:3px;}
.app{display:flex;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#EDE4D5;border-right:1px solid #D4C9B5;display:flex;flex-direction:column;padding:28px 0;z-index:10;overflow-y:auto;}
.logo{padding:0 22px 24px;border-bottom:1px solid #D4C9B5;}
.logo h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;line-height:1.3;}
.logo p{font-family:'DM Mono',monospace;font-size:10px;color:#8A7A66;margin-top:4px;letter-spacing:.06em;}
.nav{padding:14px 10px;display:flex;flex-direction:column;gap:2px;}
.navbtn{display:flex;align-items:center;gap:9px;padding:9px 11px;border:none;background:none;cursor:pointer;border-radius:7px;font-family:'Lora',serif;font-size:13px;color:#6B5B47;transition:all .15s;text-align:left;width:100%;}
.navbtn:hover{background:#E0D6C8;color:#2C2416;}
.navbtn.on{background:#2C2416;color:#F5EFE6;}
.sidebar-foot{margin-top:auto;padding:18px 22px;border-top:1px solid #D4C9B5;}
.sidebar-foot p{font-family:'DM Mono',monospace;font-size:11px;color:#8A7A66;line-height:1.9;}
.sidebar-foot strong{color:#2C2416;font-weight:500;}
.backupbtn{display:block;width:100%;margin-top:8px;padding:7px 10px;border:1px solid #D4C9B5;border-radius:7px;background:#F5EFE6;cursor:pointer;font-family:'Lora',serif;font-size:11px;color:#6B5B47;transition:all .15s;text-align:left;}
.backupbtn:hover{background:#E0D6C8;color:#2C2416;}
.main{margin-left:220px;flex:1;padding:36px 44px;min-height:100vh;}
.phdr{margin-bottom:28px;}
.phdr h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;}
.phdr p{color:#8A7A66;font-size:13px;margin-top:4px;font-style:italic;}
.view{display:none;}.view.on{display:block;}
.card{background:#FDFAF6;border:1px solid #D4C9B5;border-radius:14px;padding:28px;box-shadow:0 2px 14px rgba(44,36,22,.05);margin-bottom:20px;}
.form-date{font-family:'DM Mono',monospace;font-size:11px;color:#8A7A66;letter-spacing:.07em;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px;font-weight:500;color:#4A3D2E;}
.opt{font-weight:400;color:#A09080;font-size:11px;font-style:italic;}
textarea{background:#F5EFE6;border:1px solid #D4C9B5;border-radius:7px;padding:10px 12px;font-family:'Lora',serif;font-size:13px;color:#2C2416;resize:none;height:78px;outline:none;transition:border-color .15s;width:100%;}
textarea:focus{border-color:#8A7A66;}
textarea::placeholder{color:#B5A898;font-style:italic;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
.tag{padding:2px 9px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;border:none;transition:all .15s;background:#EDE4D5;color:#6B5B47;}
.tag.on{color:#fff;}
.moodrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.moodbtn{background:none;border:2px solid transparent;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;transition:all .15s;}
.moodbtn:hover{transform:scale(1.15);}
.moodbtn.on{border-color:#8A7A66;background:#EDE4D5;}
.moodlbl{font-size:11px;color:#8A7A66;font-style:italic;}
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.hbtn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:10px;border:2px solid #D4C9B5;background:#F5EFE6;cursor:pointer;transition:all .15s;font-family:'Lora',serif;font-size:11px;color:#6B5B47;line-height:1.2;text-align:center;}
.hbtn .ico{font-size:20px;}
.hbtn:hover{border-color:#8A7A66;background:#EDE4D5;}
.hbtn.on{border-color:#2C2416;background:#2C2416;color:#F5EFE6;}
.hnotes{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.hnote-inp{width:100%;background:#F5EFE6;border:1px solid #D4C9B5;border-radius:7px;padding:7px 11px;font-family:'Lora',serif;font-size:12px;color:#2C2416;outline:none;}
.hnote-inp:focus{border-color:#8A7A66;}
.saverow{display:flex;justify-content:flex-end;margin-top:18px;}
.savebtn{background:#2C2416;color:#F5EFE6;border:none;cursor:pointer;padding:10px 24px;border-radius:8px;font-family:'Lora',serif;font-size:13px;font-weight:500;transition:all .15s;}
.savebtn:hover{background:#4A3D2E;transform:translateY(-1px);}
.savebtn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.entries{display:flex;flex-direction:column;gap:16px;}
.ecard{background:#FDFAF6;border:1px solid #D4C9B5;border-radius:14px;padding:26px;box-shadow:0 2px 12px rgba(44,36,22,.05);transition:box-shadow .2s;}
.ecard:hover{box-shadow:0 4px 20px rgba(44,36,22,.09);}
.ecard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.edate{font-family:'DM Mono',monospace;font-size:10px;color:#8A7A66;letter-spacing:.07em;}
.esecs{display:flex;flex-direction:column;gap:12px;}
.esec{display:flex;gap:10px;}
.esec-ico{font-size:14px;flex-shrink:0;margin-top:1px;}
.esec-lbl{font-size:10px;font-family:'DM Mono',monospace;color:#A09080;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px;}
.esec-txt{font-size:13px;color:#2C2416;line-height:1.6;}
.etags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.etag{padding:1px 7px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;color:#fff;opacity:.85;}
.ehobbies{display:flex;flex-wrap:wrap;gap:5px;margin-top:11px;}
.ehbadge{display:inline-flex;align-items:center;gap:3px;background:#EDE4D5;border-radius:20px;padding:2px 9px;font-size:11px;color:#4A3D2E;}
.efoot{margin-top:14px;padding-top:12px;border-top:1px solid #EDE4D5;display:flex;justify-content:space-between;align-items:center;}
.erisk{font-size:12px;color:#6B5B47;font-style:italic;}
.edel{background:none;border:none;cursor:pointer;color:#C9B99A;font-size:11px;font-family:'Lora',serif;transition:color .15s;}
.edel:hover{color:#AA4A4A;}
.notice{background:#EDE4D5;border-radius:9px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:#6B5B47;font-style:italic;}
.hpage-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.yearsel{font-family:'DM Mono',monospace;font-size:12px;color:#6B5B47;background:#EDE4D5;border:1px solid #D4C9B5;border-radius:7px;padding:5px 10px;outline:none;cursor:pointer;}
.hcards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.hcard{background:#FDFAF6;border:1px solid #D4C9B5;border-radius:13px;padding:20px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 2px 10px rgba(44,36,22,.04);transition:box-shadow .2s;}
.hcard:hover{box-shadow:0 4px 16px rgba(44,36,22,.09);}
.hcard-ico{font-size:28px;}
.hcard-body{flex:1;}
.hcard-name{font-family:'Playfair Display',serif;font-size:14px;color:#2C2416;}
.hcard-n{font-family:'DM Mono',monospace;font-size:24px;color:#2C2416;line-height:1;margin:2px 0;}
.hcard-sub{font-size:10px;color:#A09080;font-family:'DM Mono',monospace;}
.hbar{height:3px;background:#EDE4D5;border-radius:3px;margin-top:8px;}
.hbar-fill{height:3px;background:#2C2416;border-radius:3px;}
.pcard{max-width:480px;}
.pttl{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;margin-bottom:5px;}
.psub{font-size:12px;color:#8A7A66;font-style:italic;line-height:1.6;margin-bottom:24px;}
.streak-n{font-family:'Playfair Display',serif;font-size:72px;color:#2C2416;line-height:1;text-align:center;}
.streak-l{font-family:'DM Mono',monospace;font-size:10px;color:#8A7A66;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px;text-align:center;}
.pstats{display:flex;gap:12px;margin-bottom:22px;}
.pstat{flex:1;background:#F5EFE6;border-radius:9px;padding:12px;text-align:center;}
.pstat-n{font-family:'DM Mono',monospace;font-size:18px;color:#2C2416;}
.pstat-l{font-size:9px;color:#A09080;font-family:'DM Mono',monospace;margin-top:3px;text-transform:uppercase;letter-spacing:.05em;}
.pactions{display:flex;gap:9px;}
.pbtn-fall{flex:1;padding:10px;border:2px solid #D4A8A8;border-radius:9px;background:none;cursor:pointer;font-family:'Lora',serif;font-size:12px;color:#8A5050;transition:all .15s;}
.pbtn-fall:hover{background:#F8EDED;}
.pbtn-clean{flex:1;padding:10px;border:2px solid #A8C4A8;border-radius:9px;background:none;cursor:pointer;font-family:'Lora',serif;font-size:12px;color:#4A7A4A;transition:all .15s;}
.pbtn-clean:hover{background:#EDF5ED;}
.plog{margin-top:22px;border-top:1px solid #EDE4D5;padding-top:16px;}
.plog-hdr{font-family:'DM Mono',monospace;font-size:10px;color:#A09080;letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px;}
.plog-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #F0EBE3;}
.plog-date{font-family:'DM Mono',monospace;font-size:10px;color:#6B5B47;}
.badge{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;}
.badge-fall{background:#F8EDED;color:#8A5050;}
.badge-clean{background:#EDF5ED;color:#4A7A4A;}
.calwrap{max-width:580px;}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.calarrow{background:none;border:1px solid #D4C9B5;cursor:pointer;width:32px;height:32px;border-radius:7px;font-size:15px;color:#6B5B47;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.calarrow:hover{background:#EDE4D5;}
.calmonth{font-family:'Playfair Display',serif;font-size:18px;color:#2C2416;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.caldlbl{text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:#A09080;padding:6px 0;letter-spacing:.05em;}
.calday{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#6B5B47;cursor:default;transition:all .15s;}
.calday.has{background:#2C2416;color:#F5EFE6;cursor:pointer;font-weight:500;}
.calday.has:hover{background:#4A3D2E;}
.calday.tod{outline:2px solid #C9B99A;outline-offset:1px;}
.sbar{display:flex;align-items:center;gap:10px;background:#FDFAF6;border:1px solid #D4C9B5;border-radius:9px;padding:10px 14px;margin-bottom:20px;}
.sbar input{flex:1;background:none;border:none;outline:none;font-family:'Lora',serif;font-size:13px;color:#2C2416;}
.sbar input::placeholder{color:#B5A898;font-style:italic;}
.sum-sec{margin-bottom:28px;}
.sum-sec h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:#2C2416;margin-bottom:13px;padding-bottom:7px;border-bottom:1px solid #D4C9B5;}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.scard{background:#FDFAF6;border:1px solid #D4C9B5;border-radius:11px;padding:16px;text-align:center;}
.scard-n{font-family:'Playfair Display',serif;font-size:32px;color:#2C2416;line-height:1;}
.scard-l{font-family:'DM Mono',monospace;font-size:9px;color:#A09080;letter-spacing:.07em;margin-top:4px;text-transform:uppercase;}
.tfreq{display:flex;flex-wrap:wrap;gap:8px;}
.tfi{display:flex;align-items:center;gap:6px;background:#FDFAF6;border:1px solid #D4C9B5;border-radius:7px;padding:8px 12px;}
.tfc{font-family:'DM Mono',monospace;font-size:10px;color:#8A7A66;background:#EDE4D5;padding:1px 5px;border-radius:4px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,.35);align-items:center;justify-content:center;z-index:200;}
.overlay.on{display:flex;}
.cbox{background:#FDFAF6;border-radius:13px;padding:28px;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(44,36,22,.2);}
.cbox h4{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;margin-bottom:7px;}
.cbox p{font-size:12px;color:#6B5B47;line-height:1.6;margin-bottom:18px;font-style:italic;}
.cbtns{display:flex;gap:9px;}
.cyes{flex:1;padding:9px;border:none;background:#2C2416;color:#F5EFE6;border-radius:7px;cursor:pointer;font-family:'Lora',serif;font-size:12px;}
.cno{flex:1;padding:9px;border:1px solid #D4C9B5;background:none;color:#6B5B47;border-radius:7px;cursor:pointer;font-family:'Lora',serif;font-size:12px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(44,36,22,.4);align-items:center;justify-content:center;z-index:100;}
.modal-bg.on{display:flex;}
.modal{background:#FDFAF6;border-radius:14px;padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(44,36,22,.2);}
.modal-x{float:right;background:none;border:none;cursor:pointer;font-size:17px;color:#A09080;}
.empty{text-align:center;padding:50px 20px;color:#A09080;}
.empty .ei{font-size:40px;margin-bottom:12px;}
.empty p{font-style:italic;font-size:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <h1>Growth<br>Log</h1>
      <p>LEARN · PRACTICE · CREATE</p>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <p id="sidebar-stats"></p>
      <button class="backupbtn" onclick="manualBackup()">⬇ Backup now</button>
      <button class="backupbtn" onclick="importBackup()">⬆ Restore backup</button>
    </div>
  </div>
  <main class="main">
    <div class="phdr"><h2 id="view-title"></h2><p id="view-sub"></p></div>
    <div class="view on" id="view-journal"></div>
    <div class="view" id="view-hobbies"></div>
    <div class="view" id="view-purity"></div>
    <div class="view" id="view-calendar"></div>
    <div class="view" id="view-search"></div>
    <div class="view" id="view-summary"></div>
  </main>
</div>

<div class="overlay" id="confirm-overlay">
  <div class="cbox">
    <h4 id="confirm-title"></h4>
    <p id="confirm-msg"></p>
    <div class="cbtns">
      <button class="cyes" id="confirm-yes">Yes, log it</button>
      <button class="cno" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="cal-modal">
  <div class="modal">
    <button class="modal-x" onclick="closeCalModal()">✕</button>
    <div id="cal-modal-content"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const CATS = ["Music","Tech","Physical","Creative","Social","Reading","Other"];
const CAT_COLOR = {Music:"#D4956A",Tech:"#6A9BD4",Physical:"#6AD48A",Creative:"#D46AB5",Social:"#D4C46A",Reading:"#9B6AD4",Other:"#A0A0A0"};
const MOODS = ["😴","😐","🙂","😊","🔥"];
const MOOD_L = ["Drained","Meh","Okay","Good","On fire"];
const HOBBIES = [
  {id:"running",label:"Running",icon:"🏃"},
  {id:"fishing",label:"Fishing",icon:"🎣"},
  {id:"squash",label:"Squash",icon:"🎾"},
  {id:"skate",label:"Skateboarding",icon:"🛹"},
  {id:"rl",label:"Rocket League",icon:"🚀"},
  {id:"chess",label:"Chess",icon:"♟️"},
  {id:"crossfit",label:"CrossFit",icon:"🏋️"},
  {id:"bible",label:"Bible",icon:"📖"},
  {id:"guitar",label:"Guitar",icon:"🎸"},
];

let entries = [];
let purity = {streak:0,total:0,victories:0,log:[],lastReset:null};
let currentView = "journal";
let calYear, calMonth, formMood = 2, formHobbies = [], formHobbyNotes = {};
let formLearnTags=[], formPracTags=[], formCreaTags=[];

// ── STORAGE ───────────────────────────────────────────────────────────────────
function load() {
  try { const e = localStorage.getItem("gl-entries"); if(e) entries = JSON.parse(e); } catch(x){}
  try { const p = localStorage.getItem("gl-purity"); if(p) purity = JSON.parse(p); } catch(x){}
}
function saveEntries(doBackup=true) {
  try { localStorage.setItem("gl-entries", JSON.stringify(entries)); } catch(x){}
  if(doBackup) autoBackup();
}
function savePurity() {
  try { localStorage.setItem("gl-purity", JSON.stringify(purity)); } catch(x){}
  autoBackup();
}
function autoBackup() {
  try {
    const data = {version:1, exportedAt:new Date().toISOString(), entries, purity};
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "growth-log-backup-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e){}
}
function manualBackup() { autoBackup(); }
function importBackup() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".json";
  inp.onchange = function(ev) {
    const file = ev.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if(data.entries && Array.isArray(data.entries)) {
          entries = data.entries;
          localStorage.setItem("gl-entries", JSON.stringify(entries));
        }
        if(data.purity && typeof data.purity==="object") {
          purity = data.purity;
          localStorage.setItem("gl-purity", JSON.stringify(purity));
        }
        alert("Restored " + (entries.length) + " entries successfully!");
        renderAll();
      } catch(err) { alert("Could not read that file. Make sure it's a Growth Log backup."); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  try { return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"}); }
  catch(e) { return d; }
}
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{ if(k==="class") el.className=v; else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v); else el.setAttribute(k,v); });
  children.forEach(c=>{ if(c==null||c===false) return; if(typeof c==="string"||typeof c==="number") el.appendChild(document.createTextNode(String(c))); else el.appendChild(c); });
  return el;
}

// ── NAV ───────────────────────────────────────────────────────────────────────
const VIEWS = [
  {k:"journal",i:"📖",l:"Journal",sub:"Your growth, one day at a time."},
  {k:"hobbies",i:"🏅",l:"Hobbies",sub:"How often are you doing what you love?"},
  {k:"purity",i:"🕊️",l:"Purity",sub:"Private. Honest. Just for you."},
  {k:"calendar",i:"📅",l:"Calendar",sub:"See the shape of your consistency."},
  {k:"search",i:"🔍",l:"Search",sub:"Find anything you've written."},
  {k:"summary",i:"📊",l:"Summary",sub:"A reflection on your journey."},
];
function buildNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML="";
  VIEWS.forEach(v=>{
    const btn = h("button",{class:"navbtn"+(currentView===v.k?" on":""),onclick:()=>switchView(v.k)},v.i," "+v.l);
    nav.appendChild(btn);
  });
}
function switchView(k) {
  currentView=k;
  VIEWS.forEach(v=>{ document.getElementById("view-"+v.k).classList.toggle("on",v.k===k); });
  const vd = VIEWS.find(v=>v.k===k);
  document.getElementById("view-title").textContent = vd.l;
  document.getElementById("view-sub").textContent = vd.sub;
  buildNav();
  renderView(k);
}

// ── SIDEBAR STATS ─────────────────────────────────────────────────────────────
function renderSidebarStats() {
  const st = document.getElementById("sidebar-stats");
  const activeDays = entries.filter(e=>(e.hobbies||[]).length>0).length;
  st.innerHTML = "<strong>"+entries.length+"</strong> total entries<br><strong>"+purity.streak+"</strong> days clean<br><strong>"+activeDays+"</strong> active days";
}

// ── ENTRY CARD ────────────────────────────────────────────────────────────────
function makeEntryCard(entry, onDel) {
  const card = h("div",{class:"ecard"});
  const top = h("div",{class:"ecard-top"}, h("div",{class:"edate"},fmtDate(entry.date).toUpperCase()), h("div",{},MOODS[entry.mood]||""));
  card.appendChild(top);
  const secs = h("div",{class:"esecs"});
  [["learned","🧠","Learned"],["practiced","🎯","Practiced"],["created","🛠️","Created"]].forEach(([k,ico,lbl])=>{
    if(!entry[k]) return;
    const sec = h("div",{class:"esec"}, h("div",{class:"esec-ico"},ico));
    const body = h("div",{});
    body.appendChild(h("div",{class:"esec-lbl"},lbl));
    body.appendChild(h("div",{class:"esec-txt"},entry[k]));
    const tgs = entry[k+"Tags"]||[];
    if(tgs.length) {
      const tagrow = h("div",{class:"etags"});
      tgs.forEach(t=>{ const sp=h("span",{class:"etag"},t); sp.style.background=CAT_COLOR[t]||"#999"; tagrow.appendChild(sp); });
      body.appendChild(tagrow);
    }
    sec.appendChild(body); secs.appendChild(sec);
  });
  card.appendChild(secs);
  const doneH = (entry.hobbies||[]).map(id=>HOBBIES.find(h=>h.id===id)).filter(Boolean);
  if(doneH.length) {
    const hl = h("div",{});
    hl.style.marginTop="12px";
    const lbl = h("div",{class:"esec-lbl"},"Hobbies"); lbl.style.marginBottom="6px";
    hl.appendChild(lbl);
    const hrow = h("div",{class:"ehobbies"});
    doneH.forEach(hb=>{
      const note = (entry.hobbyNotes||{})[hb.id];
      hrow.appendChild(h("span",{class:"ehbadge"}, hb.icon+" "+hb.label+(note?" · "+note:"")));
    });
    hl.appendChild(hrow); card.appendChild(hl);
  }
  const foot = h("div",{class:"efoot"}, h("div",{class:"erisk"},entry.risk?"⚡ "+entry.risk:""), h("button",{class:"edel",onclick:()=>onDel(entry.id)},"delete"));
  card.appendChild(foot);
  return card;
}

// ── JOURNAL ───────────────────────────────────────────────────────────────────
function renderJournal() {
  const el = document.getElementById("view-journal");
  el.innerHTML="";
  const todayDone = entries.some(e=>e.date===today());
  if(!todayDone) el.appendChild(buildForm());
  else el.appendChild(h("div",{class:"notice"},"✓ Already logged today. Come back tomorrow, or scroll down to review past entries."));
  const list = h("div",{class:"entries"});
  const sorted = [...entries].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length) {
    list.appendChild(h("div",{class:"empty"}, h("div",{class:"ei"},"📖"), h("p",{},"No entries yet. Write your first one above.")));
  } else {
    sorted.forEach(e=>list.appendChild(makeEntryCard(e, id=>{ entries=entries.filter(x=>x.id!==id); saveEntries(false); renderAll(); })));
  }
  el.appendChild(list);
}

function buildForm() {
  formMood=2; formHobbies=[]; formHobbyNotes={}; formLearnTags=[]; formPracTags=[]; formCreaTags=[];
  const card = h("div",{class:"card"});
  card.style.marginBottom="20px";
  card.appendChild(h("div",{class:"form-date"},fmtDate(today()).toUpperCase()));
  const grid = h("div",{class:"grid"});

  function makeField(label, id, tagArr, setTags) {
    const f = h("div",{class:"field"});
    f.appendChild(h("label",{},label));
    const ta = h("textarea",{id:id,placeholder:"Write something..."});
    f.appendChild(ta);
    const trow = h("div",{class:"tags"});
    CATS.forEach(t=>{
      const btn = h("button",{class:"tag",onclick:()=>{
        const i=tagArr.indexOf(t);
        if(i>-1) tagArr.splice(i,1); else tagArr.push(t);
        setTags(tagArr.slice());
        btn.className="tag"+(tagArr.includes(t)?" on":"");
        if(tagArr.includes(t)) btn.style.background=CAT_COLOR[t]; else btn.style.background="";
      }},t);
      trow.appendChild(btn);
    });
    f.appendChild(trow);
    return f;
  }

  const lf = makeField("🧠 What did you learn?","f-learned",formLearnTags,v=>formLearnTags=v);
  const pf = makeField("🎯 What did you practice?","f-practiced",formPracTags,v=>formPracTags=v);
  const cf = makeField("🛠️ What did you create?","f-created",formCreaTags,v=>formCreaTags=v);
  lf.querySelector("textarea").placeholder="Something new you discovered...";
  pf.querySelector("textarea").placeholder="A skill you worked on...";
  cf.querySelector("textarea").placeholder="Something you made or built...";

  const rf = h("div",{class:"field"});
  rf.appendChild(h("label",{},"⚡ Risk taken ",h("span",{class:"opt"},"optional")));
  const rta = h("textarea",{id:"f-risk",placeholder:"Something outside your comfort zone..."}); rf.appendChild(rta);

  grid.appendChild(lf); grid.appendChild(pf); grid.appendChild(cf); grid.appendChild(rf);

  // Hobbies
  const hf = h("div",{class:"field full"});
  hf.appendChild(h("label",{},"🏅 Hobbies done today ",h("span",{class:"opt"},"tap to check off")));
  const hgrid = h("div",{class:"hgrid"});
  const notesDiv = h("div",{class:"hnotes"});
  notesDiv.style.display="none";

  HOBBIES.forEach(hb=>{
    const btn = h("button",{class:"hbtn",onclick:()=>{
      const i=formHobbies.indexOf(hb.id);
      if(i>-1) { formHobbies.splice(i,1); delete formHobbyNotes[hb.id]; }
      else formHobbies.push(hb.id);
      btn.className="hbtn"+(formHobbies.includes(hb.id)?" on":"");
      rebuildNotes();
    }}, h("span",{class:"ico"},hb.icon), hb.label);
    hgrid.appendChild(btn);
  });

  function rebuildNotes() {
    notesDiv.innerHTML="";
    if(!formHobbies.length) { notesDiv.style.display="none"; return; }
    notesDiv.style.display="flex";
    formHobbies.forEach(id=>{
      const hb=HOBBIES.find(x=>x.id===id);
      const inp = h("input",{class:"hnote-inp",placeholder:hb.label+" notes... (optional)"});
      inp.value = formHobbyNotes[id]||"";
      inp.addEventListener("input",()=>formHobbyNotes[id]=inp.value);
      notesDiv.appendChild(inp);
    });
  }

  hf.appendChild(hgrid); hf.appendChild(notesDiv); grid.appendChild(hf);

  // Mood
  const mf = h("div",{class:"field full"});
  mf.appendChild(h("label",{},"Energy today?"));
  const mrow = h("div",{class:"moodrow"});
  const mlbl = h("span",{class:"moodlbl"},MOOD_L[formMood]);
  MOODS.forEach((m,i)=>{
    const btn = h("button",{class:"moodbtn"+(i===formMood?" on":""),onclick:()=>{
      formMood=i; mlbl.textContent=MOOD_L[i];
      mrow.querySelectorAll(".moodbtn").forEach((b,j)=>b.className="moodbtn"+(j===i?" on":""));
    }},m);
    mrow.appendChild(btn);
  });
  mrow.appendChild(mlbl); mf.appendChild(mrow); grid.appendChild(mf);

  card.appendChild(grid);

  const saverow = h("div",{class:"saverow"});
  const savebtn = h("button",{class:"savebtn",onclick:()=>{
    const learned = document.getElementById("f-learned").value.trim();
    const practiced = document.getElementById("f-practiced").value.trim();
    const created = document.getElementById("f-created").value.trim();
    const risk = document.getElementById("f-risk").value.trim();
    if(!learned && !practiced && !created && !formHobbies.length) return;
    const entry = {id:Date.now().toString(), date:today(), learned, learnedTags:[...formLearnTags], practiced, practicedTags:[...formPracTags], created, createdTags:[...formCreaTags], risk, mood:formMood, hobbies:[...formHobbies], hobbyNotes:{...formHobbyNotes}};
    entries.unshift(entry);
    saveEntries(true);
    renderAll();
  }},"Save today's entry →");
  saverow.appendChild(savebtn); card.appendChild(saverow);
  return card;
}

// ── HOBBIES ───────────────────────────────────────────────────────────────────
function renderHobbies() {
  const el = document.getElementById("view-hobbies");
  el.innerHTML="";
  const now = new Date();
  const selYear = el._year || now.getFullYear();
  const allYears = [...new Set([String(now.getFullYear()), ...entries.map(e=>e.date.slice(0,4))])].sort().reverse();
  const ye = entries.filter(e=>e.date.startsWith(String(selYear)));
  const counts = {};
  HOBBIES.forEach(h=>{ counts[h.id]=ye.filter(e=>(e.hobbies||[]).includes(h.id)).length; });
  const maxC = Math.max(1,...Object.values(counts));

  const hdr = h("div",{class:"hpage-hdr"});
  hdr.appendChild(h("span",{},ye.length+" logged days"));
  hdr.style.fontFamily="'DM Mono',monospace"; hdr.style.fontSize="11px"; hdr.style.color="#8A7A66";
  const sel = h("select",{class:"yearsel"});
  allYears.forEach(y=>{ const opt=h("option",{},y); opt.value=y; if(Number(y)===selYear) opt.selected=true; sel.appendChild(opt); });
  sel.addEventListener("change",()=>{ el._year=Number(sel.value); renderHobbies(); });
  hdr.appendChild(sel); el.appendChild(hdr);

  const cards = h("div",{class:"hcards"});
  HOBBIES.forEach(hb=>{
    const c=counts[hb.id];
    const card = h("div",{class:"hcard"}, h("div",{class:"hcard-ico"},hb.icon));
    const body = h("div",{class:"hcard-body"});
    body.appendChild(h("div",{class:"hcard-name"},hb.label));
    body.appendChild(h("div",{class:"hcard-n"},String(c)));
    body.appendChild(h("div",{class:"hcard-sub"},"times in "+selYear));
    const bar=h("div",{class:"hbar"}); const fill=h("div",{class:"hbar-fill"}); fill.style.width=((c/maxC)*100)+"%"; bar.appendChild(fill);
    body.appendChild(bar); card.appendChild(body); cards.appendChild(card);
  });
  el.appendChild(cards);
}

// ── PURITY ────────────────────────────────────────────────────────────────────
let confirmCallback = null;
function openConfirm(title, msg, cb) {
  document.getElementById("confirm-title").textContent=title;
  document.getElementById("confirm-msg").textContent=msg;
  confirmCallback=cb;
  document.getElementById("confirm-overlay").classList.add("on");
  document.getElementById("confirm-yes").onclick=()=>{ cb(); closeConfirm(); };
}
function closeConfirm() { document.getElementById("confirm-overlay").classList.remove("on"); }

function renderPurity() {
  const el = document.getElementById("view-purity");
  el.innerHTML="";
  const card = h("div",{class:"card pcard"});
  card.appendChild(h("div",{class:"pttl"},"Purity Tracker"));
  card.appendChild(h("div",{class:"psub"},"A private, honest space for accountability. No judgment — just you, tracking your walk."));
  card.appendChild(h("div",{class:"streak-n"},String(purity.streak)));
  card.appendChild(h("div",{class:"streak-l"},"day"+(purity.streak!==1?"s":"")+" clean"));
  const stats = h("div",{class:"pstats"});
  [{n:purity.total,l:"Total falls"},{n:purity.victories,l:"Clean days"},{n:purity.lastReset?purity.lastReset.slice(5):"—",l:"Last reset"}].forEach(s=>{
    stats.appendChild(h("div",{class:"pstat"}, h("div",{class:"pstat-n"},String(s.n)), h("div",{class:"pstat-l"},s.l)));
  });
  card.appendChild(stats);
  const acts = h("div",{class:"pactions"});
  acts.appendChild(h("button",{class:"pbtn-fall",onclick:()=>openConfirm("Log a fall","Acknowledging this takes courage. Your streak resets to 0. Every morning is a fresh start.",()=>{
    const d=today(); purity={...purity,streak:0,total:(purity.total||0)+1,log:[{date:d,type:"fall"},...(purity.log||[])].slice(0,30),lastReset:d};
    savePurity(); renderAll();
  })},"I fell today"));
  acts.appendChild(h("button",{class:"pbtn-clean",onclick:()=>openConfirm("Log a clean day","Well done. Another day added to your streak. Keep walking forward.",()=>{
    purity={...purity,streak:(purity.streak||0)+1,victories:(purity.victories||0)+1,log:[{date:today(),type:"clean"},...(purity.log||[])].slice(0,30)};
    savePurity(); renderAll();
  })},"✓ Stayed clean"));
  card.appendChild(acts);
  if((purity.log||[]).length) {
    const plog = h("div",{class:"plog"});
    plog.appendChild(h("div",{class:"plog-hdr"},"Recent log"));
    purity.log.slice(0,10).forEach(item=>{
      const row = h("div",{class:"plog-row"}, h("div",{class:"plog-date"},fmtDate(item.date)), h("span",{class:"badge "+(item.type==="fall"?"badge-fall":"badge-clean")},item.type==="fall"?"fell":"clean"));
      plog.appendChild(row);
    });
    card.appendChild(plog);
  }
  el.appendChild(card);
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
let calSelEntry = null;
function closeCalModal() { document.getElementById("cal-modal").classList.remove("on"); }
function renderCalendar() {
  const el = document.getElementById("view-calendar");
  el.innerHTML="";
  const now = new Date();
  if(!calYear) { calYear=now.getFullYear(); calMonth=now.getMonth(); }
  const map = {}; entries.forEach(e=>map[e.date]=e);
  const todayS = today();
  const wrap = h("div",{class:"calwrap"});
  const nav = h("div",{class:"calnav"});
  nav.appendChild(h("button",{class:"calarrow",onclick:()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }},"‹"));
  nav.appendChild(h("div",{class:"calmonth"},new Date(calYear,calMonth,1).toLocaleDateString("en-US",{month:"long",year:"numeric"})));
  nav.appendChild(h("button",{class:"calarrow",onclick:()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }},"›"));
  wrap.appendChild(nav);
  const grid = h("div",{class:"calgrid"});
  ["SUN","MON","TUE","WED","THU","FRI","SAT"].forEach(d=>grid.appendChild(h("div",{class:"caldlbl"},d)));
  const fd=new Date(calYear,calMonth,1).getDay(), dim=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<fd;i++) { const e=h("div",{class:"calday"}); e.style.opacity="0"; grid.appendChild(e); }
  for(let d=1;d<=dim;d++) {
    const ds=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const has=!!map[ds], isT=ds===todayS;
    const day=h("div",{class:"calday"+(has?" has":"")+(isT?" tod":"")},String(d));
    if(has) day.addEventListener("click",()=>{
      document.getElementById("cal-modal-content").innerHTML="";
      document.getElementById("cal-modal-content").appendChild(makeEntryCard(map[ds],()=>{}));
      document.getElementById("cal-modal").classList.add("on");
    });
    grid.appendChild(day);
  }
  wrap.appendChild(grid); el.appendChild(wrap);
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function renderSearch() {
  const el = document.getElementById("view-search");
  el.innerHTML="";
  const sbar = h("div",{class:"sbar"});
  sbar.appendChild(h("span",{},"🔍"));
  const inp = h("input",{type:"text",placeholder:"Search entries, hobbies, tags..."});
  sbar.appendChild(inp); el.appendChild(sbar);
  const list = h("div",{class:"entries"});
  el.appendChild(list);
  function doSearch() {
    const q=inp.value.toLowerCase(); list.innerHTML="";
    const fl=entries.filter(e=>{
      if(!q) return true;
      return [e.learned,e.practiced,e.created,e.risk].some(f=>f&&f.toLowerCase().includes(q))
        || [...(e.learnedTags||[]),...(e.practicedTags||[]),...(e.createdTags||[])].some(t=>t.toLowerCase().includes(q))
        || (e.hobbies||[]).some(id=>{ const hb=HOBBIES.find(x=>x.id===id); return hb&&hb.label.toLowerCase().includes(q); });
    }).sort((a,b)=>b.date.localeCompare(a.date));
    if(!fl.length) {
      list.appendChild(h("div",{class:"empty"}, h("div",{class:"ei"},"🔍"), h("p",{},q?"No entries match.":"No entries yet.")));
    } else {
      fl.forEach(e=>list.appendChild(makeEntryCard(e, id=>{ entries=entries.filter(x=>x.id!==id); saveEntries(false); renderAll(); })));
    }
  }
  inp.addEventListener("input",doSearch); doSearch();
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function renderSummary() {
  const el = document.getElementById("view-summary");
  el.innerHTML="";
  const now = new Date();
  const thisMonth = entries.filter(e=>e.date.startsWith(now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")));
  const allTags = entries.flatMap(e=>[...(e.learnedTags||[]),...(e.practicedTags||[]),...(e.createdTags||[])]);
  const tc={}; allTags.forEach(t=>tc[t]=(tc[t]||0)+1);
  const sortedTags=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  const mAvg=entries.length?entries.reduce((s,e)=>s+(e.mood||0),0)/entries.length:null;

  const sec1 = h("div",{class:"sum-sec"}); sec1.appendChild(h("h3",{},"Overview"));
  const sg = h("div",{class:"sgrid"});
  [{n:entries.length,l:"Total entries"},{n:thisMonth.length,l:"This month"},{n:entries.filter(e=>e.risk&&e.risk.trim()).length,l:"Risks taken"},{n:mAvg!==null?MOODS[Math.round(mAvg)]:"—",l:"Avg energy"}].forEach(s=>{
    sg.appendChild(h("div",{class:"scard"}, h("div",{class:"scard-n"},String(s.n)), h("div",{class:"scard-l"},s.l)));
  });
  sec1.appendChild(sg); el.appendChild(sec1);

  if(sortedTags.length) {
    const sec2=h("div",{class:"sum-sec"}); sec2.appendChild(h("h3",{},"Top categories"));
    const tf=h("div",{class:"tfreq"});
    sortedTags.forEach(([t,c])=>{
      const dot=h("span",{},"●"); dot.style.color=CAT_COLOR[t]||"#999";
      tf.appendChild(h("div",{class:"tfi"}, dot, h("span",{},t), h("span",{class:"tfc"},c+"×")));
    });
    sec2.appendChild(tf); el.appendChild(sec2);
  }
  if(!entries.length) el.appendChild(h("div",{class:"empty"}, h("div",{class:"ei"},"📊"), h("p",{},"Start writing entries to see your summary.")));
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderView(k) {
  if(k==="journal") renderJournal();
  else if(k==="hobbies") renderHobbies();
  else if(k==="purity") renderPurity();
  else if(k==="calendar") renderCalendar();
  else if(k==="search") renderSearch();
  else if(k==="summary") renderSummary();
}
function renderAll() {
  buildNav();
  renderSidebarStats();
  renderView(currentView);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
switchView("journal");
