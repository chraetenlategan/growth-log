// Safe storage helpers
async function storageGet(key) {
  try {
    if (window.storage) {
      const r = await window.storage.get(key);
      return r?.value ? JSON.parse(r.value) : null;
    }
  } catch(e) {}
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  } catch(e) {}
  return null;
}

async function storageSet(key, val) {
  try {
    if (window.storage) {
      await window.storage.set(key, JSON.stringify(val));
      return;
    }
  } catch(e) {}
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function fmtDate(d) {
  try {
    return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  } catch(e) { return d; }
}

// ─── SMALL COMPONENTS ────────────────────────────────────────────────────────

function TagPicker({ sel, onChange }) {
  return (
    <div className="gl-tags">
      {CATEGORIES.map(t => {
        const on = sel.includes(t);
        return (
          <button key={t} className={"gl-tag"+(on?" on":"")}
            style={on?{backgroundColor:CAT_COLOR[t]}:{}}
            onClick={() => onChange(on ? sel.filter(x=>x!==t) : [...sel,t])}>
            {t}
          </button>
        );
      })}
    </div>
  );
}

function HobbyPicker({ checked, notes, onToggle, onNote }) {
  return (
    <div>
      <div className="gl-hgrid">
        {HOBBIES.map(h => (
          <button key={h.id} className={"gl-hbtn"+(checked.includes(h.id)?" on":"")} onClick={() => onToggle(h.id)}>
            <span className="hico">{h.icon}</span>{h.label}
          </button>
        ))}
      </div>
      {checked.length > 0 && (
        <div className="gl-hnotes">
          {checked.map(id => {
            const h = HOBBIES.find(x=>x.id===id);
            return (
              <input key={id} className="gl-hnote"
                placeholder={`${h.label} notes... (optional)`}
                value={notes[id]||""}
                onChange={e => onNote(id, e.target.value)} />
            );
          })}
        </div>
      )}
    </div>
  );
}

function EntryCard({ entry, onDelete }) {
  const secs = [
    {key:"learned",  icon:"🧠", label:"Learned"},
    {key:"practiced",icon:"🎯", label:"Practiced"},
    {key:"created",  icon:"🛠️", label:"Created"},
  ];
  const doneH = (entry.hobbies||[]).map(id=>HOBBIES.find(h=>h.id===id)).filter(Boolean);
  return (
    <div className="gl-card gl-ecard">
      <div className="gl-ecardtop">
        <div className="gl-edate">{fmtDate(entry.date).toUpperCase()}</div>
        <div className="gl-emood">{MOOD_OPTIONS[entry.mood]||""}</div>
      </div>
      <div className="gl-esecs">
        {secs.map(s => entry[s.key] && (
          <div key={s.key} className="gl-esec">
            <div className="gl-esec-ico">{s.icon}</div>
            <div>
              <div className="gl-esec-lbl">{s.label}</div>
              <div className="gl-esec-txt">{entry[s.key]}</div>
              {(entry[s.key+"Tags"]||[]).length > 0 && (
                <div className="gl-etags">
                  {entry[s.key+"Tags"].map(t=><span key={t} className="gl-etag" style={{backgroundColor:CAT_COLOR[t]}}>{t}</span>)}
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
      {doneH.length > 0 && (
        <div style={{marginTop:12}}>
          <div className="gl-esec-lbl" style={{marginBottom:6}}>Hobbies</div>
          <div className="gl-ehobbies">
            {doneH.map(h=>(
              <div key={h.id} className="gl-ehbadge">
                {h.icon} {h.label}
                {entry.hobbyNotes?.[h.id] && <span className="gl-ehnote">· {entry.hobbyNotes[h.id]}</span>}
              </div>
            ))}
          </div>
        </div>
      )}
      <div className="gl-efoot">
        <div className="gl-erisk">{entry.risk ? "⚡ "+entry.risk : ""}</div>
        <button className="gl-edel" onClick={()=>onDelete(entry.id)}>delete</button>
      </div>
    </div>
  );
}

// ─── VIEWS ───────────────────────────────────────────────────────────────────

function JournalView({ entries, onDelete, onAddEntry }) {
  const BLANK = {learned:"",learnedTags:[],practiced:"",practicedTags:[],created:"",createdTags:[],risk:"",mood:2,hobbies:[],hobbyNotes:{}};
  const [f, setF] = useState(BLANK);
  const s = (k,v) => setF(p=>({...p,[k]:v}));
  const todayDone = entries.some(e=>e.date===todayStr());
  const canSave = f.learned.trim()||f.practiced.trim()||f.created.trim()||f.hobbies.length>0;

  const sorted = [...entries].sort((a,b)=>b.date.localeCompare(a.date));

  return (
    <div>
      {!todayDone && (
        <div className="gl-card gl-form">
          <div className="gl-form-date">{fmtDate(todayStr()).toUpperCase()}</div>
          <div className="gl-grid">
            <div className="gl-field">
              <label>🧠 What did you learn?</label>
              <textarea className="gl-ta" placeholder="Something new you discovered..." value={f.learned} onChange={e=>s("learned",e.target.value)}/>
              <TagPicker sel={f.learnedTags} onChange={v=>s("learnedTags",v)}/>
            </div>
            <div className="gl-field">
              <label>🎯 What did you practice?</label>
              <textarea className="gl-ta" placeholder="A skill you worked on..." value={f.practiced} onChange={e=>s("practiced",e.target.value)}/>
              <TagPicker sel={f.practicedTags} onChange={v=>s("practicedTags",v)}/>
            </div>
            <div className="gl-field">
              <label>🛠️ What did you create?</label>
              <textarea className="gl-ta" placeholder="Something you made or built..." value={f.created} onChange={e=>s("created",e.target.value)}/>
              <TagPicker sel={f.createdTags} onChange={v=>s("createdTags",v)}/>
            </div>
            <div className="gl-field">
              <label>⚡ Risk taken <span className="opt">optional</span></label>
              <textarea className="gl-ta" placeholder="Something outside your comfort zone..." value={f.risk} onChange={e=>s("risk",e.target.value)}/>
            </div>
            <div className="gl-field full">
              <label>🏅 Hobbies done today <span className="opt">tap to check off</span></label>
              <HobbyPicker checked={f.hobbies} notes={f.hobbyNotes}
                onToggle={id=>s("hobbies",f.hobbies.includes(id)?f.hobbies.filter(x=>x!==id):[...f.hobbies,id])}
                onNote={(id,v)=>s("hobbyNotes",{...f.hobbyNotes,[id]:v})}/>
            </div>
            <div className="gl-field full">
              <label>Energy today?</label>
              <div className="gl-moodrow">
                {MOOD_OPTIONS.map((m,i)=>(
                  <button key={i} className={"gl-moodbtn"+(f.mood===i?" on":"")} onClick={()=>s("mood",i)} title={MOOD_LABELS[i]}>{m}</button>
                ))}
                <span className="gl-moodlbl">{MOOD_LABELS[f.mood]}</span>
              </div>
            </div>
          </div>
          <div className="gl-saverow">
            <button className="gl-savebtn" disabled={!canSave}
              onClick={()=>{ onAddEntry({...f, date:todayStr(), id:Date.now().toString()}); setF(BLANK); }}>
              Save today's entry →
            </button>
          </div>
        </div>
      )}
      {todayDone && <div className="gl-notice">✓ Already logged today. Come back tomorrow, or scroll down to review past entries.</div>}
      <div className="gl-entries">
        {sorted.length === 0
          ? <div className="gl-empty"><div className="ei">📖</div><p>No entries yet. Write your first one above.</p></div>
          : sorted.map(e=><EntryCard key={e.id} entry={e} onDelete={onDelete}/>)
        }
      </div>
    </div>
  );
}

function HobbiesView({ entries }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const allYears = [...new Set([String(now.getFullYear()), ...entries.map(e=>e.date.slice(0,4))])].sort().reverse();
  const ye = entries.filter(e=>e.date.startsWith(String(year)));
  const counts = Object.fromEntries(HOBBIES.map(h=>[h.id, ye.filter(e=>(e.hobbies||[]).includes(h.id)).length]));
  const maxC = Math.max(1, ...Object.values(counts));
  return (
    <div>
      <div className="gl-hpage-hdr">
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#8A7A66"}}>{ye.length} logged days</span>
        <select className="gl-yearsel" value={year} onChange={e=>setYear(Number(e.target.value))}>
          {allYears.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>
      <div className="gl-hcards">
        {HOBBIES.map(h=>(
          <div key={h.id} className="gl-hcard">
            <div className="gl-hcard-ico">{h.icon}</div>
            <div className="gl-hcard-body">
              <div className="gl-hcard-name">{h.label}</div>
              <div className="gl-hcard-n">{counts[h.id]}</div>
              <div className="gl-hcard-sub">times in {year}</div>
              <div className="gl-hbar"><div className="gl-hbar-fill" style={{width:`${(counts[h.id]/maxC)*100}%`}}/></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PurityView({ data, onUpdate }) {
  const [confirm, setConfirm] = useState(null);
  const streak = data.streak||0, total = data.total||0, victories = data.victories||0;
  const log = data.log||[];

  function doFall() {
    const d = todayStr();
    onUpdate({streak:0, total:total+1, victories, log:[{date:d,type:"fall"},...log].slice(0,30), lastReset:d});
    setConfirm(null);
  }
  function doClean() {
    onUpdate({streak:streak+1, total, victories:victories+1, log:[{date:todayStr(),type:"clean"},...log].slice(0,30), lastReset:data.lastReset||null});
    setConfirm(null);
  }
  return (
    <div>
      <div className="gl-card gl-pcard">
        <div className="gl-pttl">Purity Tracker</div>
        <div className="gl-psub">A private, honest space for accountability. No judgment — just you, tracking your walk.</div>
        <div className="gl-streak"><div className="gl-streak-n">{streak}</div></div>
        <div className="gl-streak-l">day{streak!==1?"s":""} clean</div>
        <div className="gl-pstats">
          <div className="gl-pstat"><div className="gl-pstat-n">{total}</div><div className="gl-pstat-l">Total falls</div></div>
          <div className="gl-pstat"><div className="gl-pstat-n">{victories}</div><div className="gl-pstat-l">Clean days</div></div>
          <div className="gl-pstat"><div className="gl-pstat-n">{data.lastReset?data.lastReset.slice(5):"—"}</div><div className="gl-pstat-l">Last reset</div></div>
        </div>
        <div className="gl-pactions">
          <button className="gl-pbtn-fall" onClick={()=>setConfirm("fall")}>I fell today</button>
          <button className="gl-pbtn-clean" onClick={()=>setConfirm("clean")}>✓ Stayed clean</button>
        </div>
        {log.length > 0 && (
          <div className="gl-plog">
            <div className="gl-plog-hdr">Recent log</div>
            {log.slice(0,10).map((item,i)=>(
              <div key={i} className="gl-plog-row">
                <div className="gl-plog-date">{fmtDate(item.date)}</div>
                <span className={"gl-badge "+(item.type==="fall"?"gl-badge-fall":"gl-badge-clean")}>{item.type==="fall"?"fell":"clean"}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      {confirm && (
        <div className="gl-overlay" onClick={()=>setConfirm(null)}>
          <div className="gl-cbox" onClick={e=>e.stopPropagation()}>
            {confirm==="fall"
              ? <><h4>Log a fall</h4><p>Acknowledging this takes courage. Your streak resets to 0. Every morning is a fresh start.</p><div className="gl-cbtns"><button className="gl-cyes" onClick={doFall}>Yes, log it</button><button className="gl-cno" onClick={()=>setConfirm(null)}>Cancel</button></div></>
              : <><h4>Log a clean day</h4><p>Well done. Another day added to your streak. Keep walking forward.</p><div className="gl-cbtns"><button className="gl-cyes" onClick={doClean}>Yes, log it</button><button className="gl-cno" onClick={()=>setConfirm(null)}>Cancel</button></div></>
            }
          </div>
        </div>
      )}
    </div>
  );
}

function CalendarView({ entries }) {
  const [vd, setVd] = useState(new Date());
  const [sel, setSel] = useState(null);
  const map = Object.fromEntries(entries.map(e=>[e.date,e]));
  const yr=vd.getFullYear(), mo=vd.getMonth();
  const fd=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate();
  const tod=todayStr();
  const days=[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const ds=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  return (
    <div className="gl-calwrap">
      <div className="gl-calnav">
        <button className="gl-calarrow" onClick={()=>setVd(new Date(yr,mo-1,1))}>‹</button>
        <div className="gl-calmonth">{vd.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
        <button className="gl-calarrow" onClick={()=>setVd(new Date(yr,mo+1,1))}>›</button>
      </div>
      <div className="gl-calgrid">
        {["SUN","MON","TUE","WED","THU","FRI","SAT"].map(d=><div key={d} className="gl-caldlbl">{d}</div>)}
        {days.map((d,i)=>{
          if(!d) return <div key={"e"+i} className="gl-calday empty"/>;
          const s=ds(d), has=!!map[s], isT=s===tod;
          return <div key={s} className={"gl-calday"+(has?" has":"")+(isT?" tod":"")} onClick={()=>has&&setSel(map[s])}>{d}</div>;
        })}
      </div>
      {sel && (
        <div className="gl-modal-bg" onClick={()=>setSel(null)}>
          <div className="gl-modal" onClick={e=>e.stopPropagation()}>
            <button className="gl-modal-x" onClick={()=>setSel(null)}>✕</button>
            <EntryCard entry={sel} onDelete={()=>setSel(null)}/>
          </div>
        </div>
      )}
    </div>
  );
}

function SearchView({ entries, onDelete }) {
  const [q, setQ] = useState("");
  const fl = entries.filter(e=>{
    if(!q) return true;
    const ql=q.toLowerCase();
    return [e.learned,e.practiced,e.created,e.risk].some(f=>f?.toLowerCase().includes(ql))
      || [...(e.learnedTags||[]),...(e.practicedTags||[]),...(e.createdTags||[])].some(t=>t.toLowerCase().includes(ql))
      || (e.hobbies||[]).some(id=>HOBBIES.find(h=>h.id===id)?.label.toLowerCase().includes(ql));
  }).sort((a,b)=>b.date.localeCompare(a.date));
  return (
    <div>
      <div className="gl-sbar">
        <span style={{color:"#A09080",fontSize:14}}>🔍</span>
        <input placeholder="Search entries, hobbies, tags..." value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
        {q && <button style={{background:"none",border:"none",cursor:"pointer",color:"#A09080",fontSize:13}} onClick={()=>setQ("")}>✕</button>}
      </div>
      {fl.length===0
        ? <div className="gl-empty"><div className="ei">🔍</div><p>{q?"No entries match.":"No entries yet."}</p></div>
        : <div className="gl-entries">{fl.map(e=><EntryCard key={e.id} entry={e} onDelete={onDelete}/>)}</div>}
    </div>
  );
}

function SummaryView({ entries }) {
  const now = new Date();
  const thisMonth = entries.filter(e=>e.date.startsWith(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`));
  const allTags = entries.flatMap(e=>[...(e.learnedTags||[]),...(e.practicedTags||[]),...(e.createdTags||[])]);
  const tc = {}; allTags.forEach(t=>{tc[t]=(tc[t]||0)+1;});
  const sortedTags = Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  const mAvg = entries.length>0 ? entries.reduce((s,e)=>s+(e.mood||0),0)/entries.length : null;
  return (
    <div>
      <div className="gl-sum-sec">
        <h3>Overview</h3>
        <div className="gl-sgrid">
          <div className="gl-scard"><div className="gl-scard-n">{entries.length}</div><div className="gl-scard-l">Total entries</div></div>
          <div className="gl-scard"><div className="gl-scard-n">{thisMonth.length}</div><div className="gl-scard-l">This month</div></div>
          <div className="gl-scard"><div className="gl-scard-n">{entries.filter(e=>e.risk?.trim()).length}</div><div className="gl-scard-l">Risks taken</div></div>
          <div className="gl-scard"><div className="gl-scard-n">{mAvg!==null?MOOD_OPTIONS[Math.round(mAvg)]:"—"}</div><div className="gl-scard-l">Avg energy</div></div>
        </div>
      </div>
      {sortedTags.length>0 && (
        <div className="gl-sum-sec">
          <h3>Top categories</h3>
          <div className="gl-tfreq">
            {sortedTags.map(([t,c])=>(
              <div key={t} className="gl-tfi">
                <span style={{color:CAT_COLOR[t],fontSize:14}}>●</span>
                <span style={{fontSize:12,color:"#2C2416"}}>{t}</span>
                <span className="gl-tfc">{c}×</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {entries.length===0 && <div className="gl-empty"><div className="ei">📊</div><p>Start writing entries to see your summary.</p></div>}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────

function App() {
  const [entries, setEntries] = useState([]);
  const [purity, setPurity] = useState({streak:0,total:0,log:[],lastReset:null,victories:0});
  const [view, setView] = useState("journal");
  const [ready, setReady] = useState(false);

  useEffect(()=>{
    (async()=>{
      const e = await storageGet(STORAGE_KEY);
      if(Array.isArray(e)) setEntries(e);
      const p = await storageGet(PURITY_KEY);
      if(p && typeof p==="object") setPurity(p);
      setReady(true);
    })();
  },[]);

  async function saveEntries(e){ setEntries(e); await storageSet(STORAGE_KEY, e); }
  async function savePurity(p){ setPurity(p); await storageSet(PURITY_KEY, p); }

  if(!ready) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F5EFE6",fontFamily:"'Lora',serif",color:"#8A7A66",fontSize:14,fontStyle:"italic"}}>
      Loading your journal...
    </div>
  );

  const nav = [
    {k:"journal", i:"📖", l:"Journal"},
    {k:"hobbies", i:"🏅", l:"Hobbies"},
    {k:"purity",  i:"🕊️", l:"Purity"},
    {k:"calendar",i:"📅", l:"Calendar"},
    {k:"search",  i:"🔍", l:"Search"},
    {k:"summary", i:"📊", l:"Summary"},
  ];
  const hdrs = {
    journal:  ["Daily Log",    "Your growth, one day at a time."],
    hobbies:  ["Hobbies",      "How often are you doing what you love?"],
    purity:   ["Purity",       "Private. Honest. Just for you."],
    calendar: ["Calendar",     "See the shape of your consistency."],
    search:   ["Search",       "Find anything you've written."],
    summary:  ["Summary",      "A reflection on your journey."],
  };

  return (
    <>
      <style>{FONTS}{CSS}</style>
      <div className="gl-app">
        <div className="gl-sidebar">
          <div className="gl-logo">
            <h1>Growth<br/>Log</h1>
            <p>LEARN · PRACTICE · CREATE</p>
          </div>
          <nav className="gl-nav">
            {nav.map(n=>(
              <button key={n.k} className={"gl-navbtn"+(view===n.k?" on":"")} onClick={()=>setView(n.k)}>
                <span className="ni">{n.i}</span>{n.l}
              </button>
            ))}
          </nav>
          <div className="gl-sidebar-foot">
            <p>
              <strong>{entries.length}</strong> total entries<br/>
              <strong>{purity.streak}</strong> days clean<br/>
              <strong>{entries.filter(e=>(e.hobbies||[]).length>0).length}</strong> active days
            </p>
          </div>
        </div>
        <main className="gl-main">
          <div className="gl-phdr">
            <h2>{hdrs[view][0]}</h2>
            <p>{hdrs[view][1]}</p>
          </div>
          {view==="journal"  && <JournalView  entries={entries} onDelete={id=>saveEntries(entries.filter(x=>x.id!==id))} onAddEntry={e=>saveEntries([e,...entries])}/>}
          {view==="hobbies"  && <HobbiesView  entries={entries}/>}
          {view==="purity"   && <PurityView   data={purity} onUpdate={savePurity}/>}
          {view==="calendar" && <CalendarView entries={entries}/>}
          {view==="search"   && <SearchView   entries={entries} onDelete={id=>saveEntries(entries.filter(x=>x.id!==id))}/>}
          {view==="summary"  && <SummaryView  entries={entries}/>}
        </main>
      </div>
    </>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
